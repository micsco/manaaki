#:schema https://www.schemastore.org/prek.json
# Configuration for prek: https://prek.j178.dev

[[repos]]
repo = "local"

  [[repos.hooks]]
  id = "biome-check"
  name = "Biome check"
  entry = "pnpm check:fix"
  language = "system"
  files = '\.(ts|tsx|js|jsx|json|md)$'
  pass_filenames = false

  [[repos.hooks]]
  id = "type-check"
  name = "TypeScript type check"
  entry = "pnpm type-check"
  language = "system"
  files = '\.(ts|tsx)$'
  pass_filenames = false

  [[repos.hooks]]
  id = "test"
  name = "Unit tests"
  entry = "pnpm test"
  language = "system"
  pass_filenames = false
  stages = ["pre-push"]

  [[repos.hooks]]
  id = "build"
  name = "Build"
  entry = "pnpm build"
  language = "system"
  pass_filenames = false
  stages = ["pre-push"]
