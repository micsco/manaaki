repos:
  - repo: local
    hooks:
      - id: biome-check
        name: Biome check
        entry: pnpm run check
        language: system
        files: '\.(ts|tsx|js|jsx|json|md)$'
        pass_filenames: false
        
      - id: biome-format
        name: Biome format
        entry: pnpm run format
        language: system
        files: '\.(ts|tsx|js|jsx|json|md)$'
        pass_filenames: false
        
      - id: type-check
        name: TypeScript check
        entry: pnpm run type-check
        language: system
        files: '\.(ts|tsx)$'
        pass_filenames: false